name: SDFNav

defaults:
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 256
  max_episode_length: 500

drone_model: Firefly
force_sensor: false
time_encoding: false

reward_effort_weight: 0.05
reward_action_smoothness_weight: 0.02
reward_distance_scale: 1.0

ravel_obs: true
action_transform: null
